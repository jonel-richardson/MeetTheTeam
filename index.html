<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RXR GAAP Team</title>
<meta name="description" content="Connect with the team behind RXR GAAP.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#071B3A; --accent:#00A3E3; --muted:#5b6b7c; --faint:#93a0ae;
    --line:#e6ecf2; --surface:#f5f8fb; --white:#fff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink); background:#fff;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100dvh; display:flex; flex-direction:column;
    background-image:radial-gradient(120% 80% at 50% -10%, rgba(0,163,227,.05), transparent 60%);
  }
  .wrap{width:100%; max-width:560px; margin:0 auto; padding:clamp(28px,7vw,56px) 22px 40px; flex:1; display:flex; flex-direction:column}
  header{text-align:center; margin-bottom:clamp(26px,6vw,40px)}
  .logo{width:min(70%,260px); height:auto; display:block; margin:0 auto clamp(20px,5vw,30px)}
  h1{font-size:clamp(22px,5.6vw,30px); font-weight:700; letter-spacing:-.02em; margin:0 0 10px}
  .sub{font-size:clamp(14px,3.6vw,16px); line-height:1.5; color:var(--muted); margin:0 auto; max-width:34ch}
  main{display:flex; flex-direction:column; gap:14px}
  .card{
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:18px 18px; box-shadow:0 8px 26px rgba(7,27,58,.05);
  }
  .ava{
    width:52px; height:52px; flex:none; border-radius:50%;
    background:var(--ink); color:#fff; display:grid; place-items:center;
    font-weight:700; font-size:17px; letter-spacing:.02em;
  }
  .who{flex:1 1 auto; min-width:0}
  .name{font-size:clamp(16px,4.2vw,18px); font-weight:600; margin:0 0 2px}
  .role{font-size:13px; color:var(--accent); font-weight:600; margin:0; letter-spacing:.01em}
  .links{display:flex; gap:9px; flex:1 1 100%; margin-top:2px}
  .btn{
    flex:1 1 0; min-height:44px; border-radius:11px; padding:0 14px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-size:14px; font-weight:600; text-decoration:none; cursor:pointer;
    transition:transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .btn:active{transform:translateY(1px)}
  .btn-in{background:#0A66C2; color:#fff; border:1px solid #0A66C2}
  .btn-in:hover{background:#004182; border-color:#004182}
  .btn-ghost{background:#fff; color:var(--ink); border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent)}
  .is-soon{color:var(--faint); border-color:var(--line); cursor:default}
  .is-soon:hover{color:var(--faint); border-color:var(--line)}
  footer{text-align:center; margin-top:auto; padding-top:34px; color:var(--faint); font-size:12px; letter-spacing:.02em}
  @media (min-width:480px){
    .card{flex-wrap:nowrap}
    .links{flex:0 0 auto; margin-top:0; width:auto}
    .btn{flex:0 0 auto; min-width:120px}
  }
  @media (prefers-reduced-motion:reduce){ .btn{transition:none} }
  .ava{overflow:hidden}
  .ava img{width:100%;height:100%;object-fit:cover;display:block}
</style>
</head>
